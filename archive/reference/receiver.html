<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8"/>
  <title>Reaction Viewer</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #f7f7f7;
      padding: 20px;
    }

    h2 {
      margin-top: 0;
    }

    .reaction {
      font-size: 28px;
      font-weight: bold;
      margin: 12px 0;
      padding: 14px 20px;
      border-radius: 12px;
      display: inline-block;
    }

    .nod {
      background: #e6f4ea;
      color: #137333;
    }

    .shake {
      background: #fdecea;
      color: #a50e0e;
    }

    .meta {
      font-size: 12px;
      color: #666;
      margin-top: 4px;
    }

    #log {
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <h2>話し手用リアクション表示</h2>

  <div id="current"></div>

  <div id="log"></div>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script>
    const SERVER_URL = "172.29.253.78:3000"; // ←中継サーバIP
    const ROOM_ID = "room1";
    const USER_ID = "speaker1";

    const currentEl = document.getElementById("current");
    const logEl = document.getElementById("log");

    const socket = io(SERVER_URL);

    socket.on("connect", () => {
      socket.emit("join", {
        roomId: ROOM_ID,
        role: "speaker",
        userId: USER_ID
      });
    });

    socket.on("reaction", (p) => {
      // p = { from, type, strength, ts }
      const timeStr = new Date(p.ts).toLocaleTimeString();

      let text = "";
      let cls = "";

      if (p.type === "nod") {
        text = "👍 頷き（肯定）";
        cls = "nod";
      } else if (p.type === "shake") {
        text = "👎 首振り（否定）";
        cls = "shake";
      }

      // ① 現在のリアクション（大きく表示）
      currentEl.innerHTML = `
        <div class="reaction ${cls}">
          ${text}
          <div class="meta">
            from: ${p.from} / ${timeStr}
          </div>
        </div>
      `;

      // ② 履歴ログ（小さく）
      logEl.innerHTML =
        `<div class="meta">[${timeStr}] ${p.from}: ${p.type}</div>` +
        logEl.innerHTML;

      // ③ 一定時間後に消す（邪魔にならないように）
      setTimeout(() => {
        currentEl.innerHTML = "";
      }, 1200);
    });
  </script>
</body>
</html>
